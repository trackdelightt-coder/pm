<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
<meta name="theme-color" content="#0f172a">
<title>設計專案執行總覽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0f172a;--ink2:#334155;--ink3:#64748b;--ink4:#94a3b8;
  --line:#e2e8f0;--bg:#f1f5f9;--white:#fff;
  --jia:#2563eb;--jia-l:#dbeafe;
  --ai:#7c3aed;--ai-l:#ede9fe;
  --jc:#0891b2;--jc-l:#e0f2fe;
  --biz:#0f766e;--biz-l:#ccfbf1;
  --done:#16a34a;--done-l:#dcfce7;
  --prog:#d97706;--prog-l:#fef3c7;
  --wait:#64748b;--wait-l:#f1f5f9;
  --alert:#dc2626;--alert-l:#fee2e2;
}
body{font-family:'Noto Sans TC',-apple-system,'PingFang TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8000;padding:20px}
.login-screen.hide{display:none}
.login-view-btn{background:white;border:none;color:var(--ink);font-size:16px;font-weight:700;padding:16px 48px;border-radius:14px;cursor:pointer;font-family:inherit;margin-bottom:40px;width:100%;max-width:280px}
.login-edit-wrap{display:flex;align-items:center;gap:8px;opacity:.3;transition:opacity .2s}
.login-edit-wrap:hover{opacity:.7}
.login-edit-input{padding:8px 12px;border:1px solid #334155;border-radius:8px;background:transparent;color:white;font-size:13px;font-family:inherit;outline:none;width:120px}
.login-edit-input::placeholder{color:#475569}
.login-edit-btn{background:none;border:1px solid #334155;color:#94a3b8;font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit}
.login-err{font-size:12px;color:var(--alert);margin-top:8px;min-height:16px;text-align:center}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:7000;color:white}
.loading-screen.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOPBAR */
.topbar{background:var(--ink);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:200}
.topbar-title{font-size:14px;font-weight:900;color:white;white-space:nowrap}
.topbar-tabs{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ttab{background:none;border:none;color:#94a3b8;font-size:12px;font-weight:700;padding:6px 10px;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ttab.active{background:rgba(255,255,255,.15);color:white}
.t-btn{background:rgba(255,255,255,.1);border:none;color:white;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}
.t-btn.primary{background:var(--jia)}
.mode-tag{font-size:10px;color:#475569}

/* SCREENS */
.screen{display:none}.screen.active{display:block}

/* KPI */
.kpi-bar{background:white;border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;align-items:center}
.kpi-bar::-webkit-scrollbar{display:none}
.kpi{display:flex;align-items:center;gap:8px;flex-shrink:0}
.kpi-num{font-size:24px;font-weight:900;line-height:1}
.kpi-lbl{font-size:10px;color:var(--ink3);font-weight:600}
.kpi-div{width:1px;background:var(--line);height:28px;flex-shrink:0}
.biz-chips{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.biz-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:flex;gap:4px;align-items:center}

/* FILTER */
.filter-bar{background:white;border-bottom:1px solid var(--line);padding:8px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;cursor:pointer;border:1.5px solid var(--line);background:white;color:var(--ink3);font-family:inherit}
.chip.active{background:var(--ink);color:white;border-color:var(--ink)}
.search-wrap{padding:8px 16px 0;background:white}
.search-box{width:100%;padding:8px 14px;border:1.5px solid var(--line);border-radius:20px;font-size:13px;font-family:inherit;outline:none;background:white}
.search-box:focus{border-color:var(--jia)}

/* BADGES */
.grade{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:800}
.grade-急{background:#fee2e2;color:#dc2626;animation:pulse-red 1.5s infinite}
.grade-大{background:#fef3c7;color:#92400e}
.grade-中{background:#e0f2fe;color:#075985}
.grade-小{background:#f0fdf4;color:#14532d}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
.biz-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;white-space:nowrap}
.biz-佳{background:var(--jia-l);color:var(--jia)}
.biz-艾{background:var(--ai-l);color:var(--ai)}
.biz-JC{background:var(--jc-l);color:var(--jc)}
.biz-佳艾{background:linear-gradient(90deg,var(--jia-l),var(--ai-l));color:var(--ink2)}
.biz-事業{background:var(--biz-l);color:var(--biz)}
.status-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.s-待執行{background:var(--wait-l);color:var(--wait)}
.s-執行中{background:var(--prog-l);color:var(--prog)}
.s-已完成{background:var(--done-l);color:var(--done)}
.s-設計中{background:#f0fdf4;color:#16a34a}
.s-提案{background:#eff6ff;color:#2563eb}
.s-修改中{background:#fff7ed;color:#ea580c}
.s-已簽核{background:#faf5ff;color:#9333ea}
.s-製作檔{background:#f0f9ff;color:#0891b2}
.s-給檔完成{background:#dcfce7;color:#16a34a;font-weight:800}
.s-待執行{background:var(--wait-l);color:var(--wait)}
.s-流標{background:#f1f5f9;color:#94a3b8;text-decoration:line-through}
.alert-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.a-yes{background:var(--alert-l);color:var(--alert)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-track{flex:1;height:6px;background:var(--line);border-radius:10px;overflow:hidden;min-width:50px}
.prog-fill{height:100%;border-radius:10px;transition:width .5s}
.prog-pct{font-size:12px;font-weight:700;min-width:32px;text-align:right}

/* BOSS TABLE */
.table-wrap{padding:12px 16px;overflow-x:auto}
.boss-table{width:100%;background:white;border-radius:14px;overflow:hidden;border-collapse:collapse;box-shadow:0 1px 4px rgba(15,23,42,.06);min-width:760px}
.boss-table th{background:var(--bg);font-size:11px;font-weight:700;color:var(--ink3);padding:10px 12px;text-align:left;letter-spacing:.04em;white-space:nowrap}
.boss-table td{padding:11px 12px;border-top:1px solid var(--line);font-size:13px;vertical-align:middle;white-space:normal;word-break:break-word}
.boss-table tr:hover td{background:#f8fafc;cursor:pointer}
.boss-table tr:hover td{background:#eff6ff}
.boss-table tr.alert-tr>td:first-child{border-left:3px solid var(--alert)}

/* MOBILE CARDS */
.boss-cards{padding:10px 16px;display:none}
.boss-card{background:white;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(15,23,42,.06);cursor:pointer;border:1.5px solid transparent}
.boss-card.alert-card{border-color:var(--alert)}
.bc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.bc-name{font-size:15px;font-weight:700;flex:1}
.bc-badges{display:flex;gap:5px;flex-shrink:0;margin-left:8px;flex-wrap:wrap;justify-content:flex-end}
.bc-meta{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bc-meta-item{font-size:11px;color:var(--ink3)}

/* 細項 */
.items-filter{background:white;border-bottom:1px solid var(--line);padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.items-select{padding:7px 10px;border:1.5px solid var(--line);border-radius:10px;font-size:12px;font-family:inherit;outline:none;background:white}
.items-select:focus{border-color:var(--jia)}
.items-stats{padding:7px 16px;background:white;border-bottom:1px solid var(--line);font-size:12px;color:var(--ink3)}
.items-table-wrap{padding:12px 16px;overflow-x:auto}
.items-table{width:100%;background:white;border-radius:14px;overflow:hidden;border-collapse:collapse;box-shadow:0 1px 4px rgba(15,23,42,.06);min-width:750px}
.items-table th{background:var(--bg);font-size:11px;font-weight:700;color:var(--ink3);padding:10px 12px;text-align:left;letter-spacing:.04em;white-space:nowrap}
.items-table td{padding:10px 12px;border-top:1px solid var(--line);font-size:13px;vertical-align:middle;white-space:normal;word-break:break-word}
.items-table tr:hover td{background:#f8fafc;cursor:pointer}
.items-table tr.row-執行中>td:first-child{border-left:3px solid var(--prog)}
.items-table tr.row-待執行>td:first-child{border-left:3px solid var(--wait)}
.items-table tr.row-已完成>td:first-child{border-left:3px solid var(--done)}

/* MOBILE ITEM CARDS */
.items-cards-m{padding:10px 16px;display:none}
.item-card-m{background:white;border-radius:12px;padding:13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(15,23,42,.06);border-left:4px solid transparent}
.item-card-m.st-執行中{border-left-color:var(--prog)}
.item-card-m.st-待執行{border-left-color:var(--wait)}
.item-card-m.st-已完成{border-left-color:var(--done)}

/* DASHBOARD */
.dash-wrap{padding:14px 16px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.dash-card{background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.dash-card-num{font-size:26px;font-weight:900;margin-bottom:3px}
.dash-card-lbl{font-size:11px;color:var(--ink3);font-weight:600}
.dash-section{background:white;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(15,23,42,.06);margin-bottom:12px}
.dash-section-title{font-size:13px;font-weight:800;margin-bottom:12px;color:var(--ink2)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--ink2);min-width:64px;text-align:right}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s}
.bar-val{font-size:12px;font-weight:700;min-width:24px}
.pie-row{display:flex;gap:8px;flex-wrap:wrap}
.pie-item{display:flex;align-items:center;gap:5px;font-size:12px}
.pie-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ALERT BANNER */
.alert-banner{background:var(--alert-l);border-left:4px solid var(--alert);padding:10px 16px;margin:10px 16px;border-radius:10px;font-size:13px;color:var(--alert);font-weight:600;display:none}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal{background:white;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px 20px 40px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:20px;padding:28px 32px 32px}}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink3);line-height:1}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:700;color:var(--ink2)}
.form-input,.form-select,.form-textarea{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--jia);background:white}
.form-textarea{resize:none;height:70px;line-height:1.6}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-save{flex:1;padding:13px;background:var(--jia);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cancel{padding:13px 16px;background:var(--bg);color:var(--ink2);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-del{padding:13px 16px;background:var(--alert-l);color:var(--alert);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* LOG / NOTES */
.log-entry{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.log-time{font-size:10px;color:var(--ink4);margin-bottom:3px}
.log-text{font-size:13px;color:var(--ink2);line-height:1.6}
.log-add{display:flex;gap:8px;margin-top:10px}
.log-input{flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-family:inherit;outline:none}
.log-input:focus{border-color:var(--jia)}
.log-btn{padding:9px 14px;background:var(--jia);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* DETAIL */
.detail-modal{background:white;width:100%;max-width:540px;border-radius:20px 20px 0 0;padding:20px 20px 40px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.detail-modal{border-radius:20px;padding:28px 32px 32px}}
.dm-name{font-size:20px;font-weight:900;margin-bottom:8px}
.dm-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.dm-prog-label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:7px}
.dm-prog-track{height:10px;background:var(--line);border-radius:10px;overflow:hidden;margin-bottom:14px}
.dm-prog-fill{height:100%;border-radius:10px}
.dm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.dm-box{background:var(--bg);border-radius:10px;padding:12px}
.dm-box-lbl{font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:4px}
.dm-box-val{font-size:17px;font-weight:900}
.dm-section-title{font-size:12px;font-weight:700;color:var(--ink3);letter-spacing:.05em;margin:14px 0 8px}

/* EMPTY / TOAST */
.empty-state{text-align:center;padding:48px 20px;color:var(--ink4)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-txt{font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:28px;cursor:pointer}

@media(max-width:768px){
  .table-wrap{display:none}.boss-cards{display:block}
  .items-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .hide-mobile{display:none}
}
@media(min-width:769px){.boss-cards{display:none}}
.items-cards-m{display:none!important}

/* Kanban */
.kanban-col{flex-shrink:0;width:220px}
.kanban-col-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:3px solid;margin-bottom:10px}
.kanban-col-title{font-size:13px;font-weight:800}
.kanban-col-count{font-size:12px;font-weight:700;background:rgba(0,0,0,.07);padding:2px 8px;border-radius:20px}
.kanban-card{background:white;border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;border:1.5px solid var(--line);transition:box-shadow .15s}
.kanban-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.13)}
.kanban-card-name{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.4;word-break:break-all}
.kanban-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.report-range-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line);background:white;color:var(--ink3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.report-range-btn.active{background:var(--jia);color:white;border-color:var(--jia)}
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div style="font-size:36px;margin-bottom:10px">📋</div>
  <div style="font-size:22px;font-weight:900;color:white;margin-bottom:4px;text-align:center">設計專案執行總覽</div>
  <div style="font-size:13px;color:#64748b;margin-bottom:40px">設計專案課</div>
  <button class="login-view-btn" onclick="enterViewMode()">👁 查看進度</button>
  <div class="login-edit-wrap">
    <input class="login-edit-input" type="password" id="pwInput" placeholder="編輯密碼" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="login-edit-btn" onclick="checkPw()">進入</button>
  </div>
  <div class="login-err" id="pwErr"></div>
</div>

<!-- LOADING -->
<div class="loading-screen hide" id="loadingScreen">
  <div class="spinner"></div>
  <div style="font-size:16px;font-weight:700">載入資料中…</div>
  <div style="font-size:12px;color:#64748b;margin-top:6px">連接 Firebase</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">📋 設計專案執行總覽</div>
  <div class="topbar-tabs">
    <button class="ttab active" onclick="showScreen('boss',this)">大項目</button>
    <button class="ttab" onclick="showScreen('items',this)">細項</button>
    <button class="ttab" onclick="showScreen('dash',this)">統計</button>
    <button class="ttab" onclick="showScreen('report',this)">📋 進度報告</button>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="mode-tag" id="modeTag"></span>
    <button class="t-btn primary hide-mobile" id="addBtnTop" onclick="handleAddBtn()" style="display:none">＋ 新增</button>
  </div>
</div>

<!-- 大項目 -->
<div class="screen active" id="screen-boss">
  <div class="kpi-bar">
    <div class="kpi"><div class="kpi-num" id="kTotal" style="color:var(--ink)">0</div><div><div class="kpi-lbl">總專案</div></div></div>
    <div class="kpi-div"></div>
    <div class="kpi"><div class="kpi-num" id="kDone" style="color:var(--done)">0</div><div><div class="kpi-lbl">已完成</div></div></div>
    <div class="kpi-div"></div>
    <div class="kpi"><div class="kpi-num" id="kProg" style="color:var(--prog)">0</div><div><div class="kpi-lbl">執行中</div></div></div>
    <div class="kpi-div"></div>
    <div class="kpi"><div class="kpi-num" id="kAlert" style="color:var(--alert)">0</div><div><div class="kpi-lbl">需追蹤</div></div></div>
    <div class="biz-chips" id="bizChips"></div>
  </div>

<script>
// ── Firebase SDK v8 compat ──
const firebaseConfig = {
  apiKey: "AIzaSyCBxVJMKPAR-DZu4FYM2cEfoNuS5f5nq0U",
  authDomain: "pm2026-bc504.firebaseapp.com",
  projectId: "pm2026-bc504",
  storageBucket: "pm2026-bc504.firebasestorage.app",
  messagingSenderId: "763951110625",
  appId: "1:763951110625:web:89ba5ea09b679b69901aa0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const PASS = '951753';

let isEdit = false;
let projects = [];
let items = [];
let bossFilter = 'all';
let editProjId = null;
let editItemId = null;
let detailProjId = null;
let curScreen = 'boss';
let tempProjLogs = [];
let tempItemLogs = [];
let collapseDone = true;

// ── LOGIN ──
window.checkPw = () => {
  if(document.getElementById('pwInput').value === PASS){ isEdit=true; startApp(); }
  else { document.getElementById('pwErr').textContent='密碼錯誤'; setTimeout(()=>document.getElementById('pwErr').textContent='',2000); }
};
window.enterViewMode = () => { isEdit=false; startApp(); };

function startApp(){
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('modeTag').textContent = isEdit?'✏️ 編輯':'👁 查看';
  // 自動設定當年度
  const curYear = new Date().getFullYear().toString();
  ['yearFilter','filterYear','dashYearSel'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      // check if current year option exists
      const opt=[...el.options].find(o=>o.value===curYear);
      if(opt) el.value=curYear;
    }
  });
  if(isEdit){
    document.getElementById('addBtnTop').style.display='';
    document.getElementById('mobileAddProj').style.display='block';
    document.getElementById('addItemBtn').style.display='';
    document.getElementById('mobileAddItem').style.display='block';
    document.getElementById('detailEditBtn').style.display='';
    document.getElementById('dmLogAdd').style.display='flex';
  }
  loadData();
}

// ── FIREBASE ──
function loadData(){
  document.getElementById('loadingScreen').classList.remove('hide');
  let pl=false,il=false;
  const tryHide=()=>{ if(pl&&il){ document.getElementById('loadingScreen').classList.add('hide'); checkDeadlines(); } };
  db.collection('projects').onSnapshot(snap=>{
    projects=snap.docs.map(d=>({id:d.id,...d.data()}));
    pl=true; tryHide(); renderBoss(); renderDash(); populateFilters();
  });
  db.collection('items').onSnapshot(snap=>{
    items=snap.docs.map(d=>({id:d.id,...d.data()}));
    il=true; tryHide(); renderBoss(); renderItems(); renderDash();
  });
}

// ── HELPERS ──
const getProj = id => projects.find(p=>p.id===id);
const projItems = pid => items.filter(i=>i.projId===pid);

const DONE_STATUS='給檔完成';
const VOID_STATUS='流標';
const IN_PROGRESS=['待執行','設計中','提案中','修改中','已簽核','製作檔'];
const ALL_STAGES=[...IN_PROGRESS,DONE_STATUS,VOID_STATUS];
function autoStatus(pid){
  const its=projItems(pid);
  if(!its.length) return null;
  const active=its.filter(i=>i.status!==VOID_STATUS);
  if(!active.length) return '流標';
  if(active.every(i=>i.status===DONE_STATUS)) return '已完成';
  if(active.some(i=>i.status!=='待執行')) return '執行中';
  return '待執行';
}
function autoAlert(pid){
  const p=projects.find(x=>x.id===pid)||{};
  const st=getStatus(p);
  if(st==='已完成'||st==='流標') return '-';
  const d=parseDate(p.date);
  if(!d) return '-';
  const now=new Date();
  const diff=(d-now)/(1000*60*60*24);
  if(diff<=7) return '需追蹤'; // 7天內或已逾期
  return '持續推進';
}
function calcPct(pid){
  const its=projItems(pid).filter(i=>i.status!==VOID_STATUS);
  if(!its.length) return null;
  return Math.round(its.filter(i=>i.status===DONE_STATUS).length/its.length*100);
}
function pctNum(pid){ const p=calcPct(pid); return p!==null?p:0; }
function autoDoneDate(pid){
  const its=projItems(pid).filter(i=>i.status!==VOID_STATUS);
  if(!its.length) return null;
  if(!its.every(i=>i.status===DONE_STATUS)) return null;
  const dates=its.map(i=>i.doneDate).filter(Boolean);
  if(!dates.length) return null;
  return dates.sort().reverse()[0];
}
function getStatus(p){
  if(!p) return '待執行';
  const auto=autoStatus(p.id);
  if(auto) return auto;
  // Map stage to display status
  const s=p.status||'待執行';
  if(s===DONE_STATUS) return '已完成';
  if(s===VOID_STATUS) return '流標';
  if(s==='待執行') return '待執行';
  return '執行中';
}
function sc(s){
  if(s==='已完成'||s===DONE_STATUS) return 'var(--done)';
  if(s==='執行中') return 'var(--prog)';
  return 'var(--wait)';
}
function stageColor(s){
  return {
    '待執行':'#64748b','設計中':'#16a34a','提案中':'#2563eb','修改中':'#ea580c',
    '已簽核':'#9333ea','製作檔':'#0891b2','給檔完成':'#16a34a','流標':'#94a3b8'
  }[s]||'#64748b';
}
function stageBg(s){
  return {
    '待執行':'#f1f5f9','設計中':'#f0fdf4','提案中':'#eff6ff','修改中':'#fff7ed',
    '已簽核':'#faf5ff','製作檔':'#f0f9ff','給檔完成':'#dcfce7','流標':'#f8fafc'
  }[s]||'#f1f5f9';
}
function bizL(b){ return {佳:'佳瑪',艾:'艾瑪特',JC:'JCPARK',佳艾:'佳＋艾',事業:'事業部',招商:'招商事業部'}[b]||b||'—'; }
function bizC(b){ return 'biz-'+(b==='佳艾'?'佳艾':b==='招商'?'事業':b||'事業'); }
function newId(p){ return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); }
function today(){ return new Date().toISOString().slice(0,10); }
function now(){ return new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function parseDate(d){
  if(!d) return null;
  if(d.includes('-')) return new Date(d);
  const p=d.split('/'); return p.length===2?new Date(2026,parseInt(p[0])-1,parseInt(p[1])):null;
}

// ── DEADLINE CHECK ──
function checkDeadlines(){
  const soon=[];
  const today7=new Date(); today7.setDate(today7.getDate()+7);
  projects.forEach(p=>{
    const st=getStatus(p);
    if(st==='已完成'||st==='流標') return;
    const d=parseDate(p.date);
    if(d&&d<=today7) soon.push(`${p.name}（${p.date}）`);
  });
  const banner=document.getElementById('alertBanner');
  if(soon.length){
    banner.style.display='block';
    banner.innerHTML=`⚠️ 即將到期（7天內）：${soon.join('、')}`;
  } else banner.style.display='none';
}

// ── COLLAPSE DONE ──
window.toggleCollapse = () => {
  collapseDone = !collapseDone;
  const btn = document.getElementById('collapseBtn');
  btn.textContent = collapseDone ? '已完成收合 ✓' : '已完成收合 ○';
  btn.style.color = collapseDone ? 'var(--ink3)' : 'var(--done)';
  renderBoss();
};

// ── BOSS SCREEN ──
window.renderBoss = function(){
  const statuses=projects.map(p=>getStatus(p));
  document.getElementById('kTotal').textContent=projects.length;
  document.getElementById('kDone').textContent=statuses.filter(s=>s==='已完成').length;
  document.getElementById('kProg').textContent=statuses.filter(s=>s==='執行中').length;
  document.getElementById('kAlert').textContent=projects.filter(p=>autoAlert(p.id)==='需追蹤').length;
  const c={佳:0,艾:0,JC:0,招商:0};
  projects.forEach(p=>{if(p.biz==='佳'||p.biz==='佳艾')c['佳']++;if(p.biz==='艾'||p.biz==='佳艾')c['艾']++;if(p.biz==='JC')c['JC']++;if(p.biz==='招商')c['招商']++;});
  document.getElementById('bizChips').innerHTML=`
    <div class="biz-chip" style="background:var(--jia-l);color:var(--jia)"><span>佳瑪</span><strong>${c['佳']}</strong></div>
    <div class="biz-chip" style="background:var(--ai-l);color:var(--ai)"><span>艾瑪特</span><strong>${c['艾']}</strong></div>
    <div class="biz-chip" style="background:var(--jc-l);color:var(--jc)"><span>JCPARK</span><strong>${c['JC']}</strong></div>
    <div class="biz-chip" style="background:var(--biz-l);color:var(--biz)"><span>招商</span><strong>${c['招商']}</strong></div>`;

  const q=(document.getElementById('bossSearch').value||'').toLowerCase();
  let list=projects.map(p=>({...p,_status:getStatus(p),_pct:pctNum(p.id)}));
  if(bossFilter==='需追蹤') list=list.filter(p=>p.alert==='需追蹤');
  else if(bossFilter==='佳') list=list.filter(p=>p.biz==='佳'||p.biz==='佳艾');
  else if(bossFilter==='艾') list=list.filter(p=>p.biz==='艾'||p.biz==='佳艾');
  else if(bossFilter==='招商') list=list.filter(p=>p.biz==='招商');
  else if(bossFilter==='進行中') list=list.filter(p=>getStatus(p)==='執行中');
  else if(bossFilter==='給檔完成') list=list.filter(p=>getStatus(p)==='已完成');
  else if(bossFilter==='流標') list=list.filter(p=>getStatus(p)==='流標');
  else if(bossFilter==='待執行') list=list.filter(p=>getStatus(p)==='待執行');
  else if(bossFilter!=='all') list=list.filter(p=>p._status===bossFilter||p.biz===bossFilter||p.grade===bossFilter);
  if(q) list=list.filter(p=>(p.name||'').toLowerCase().includes(q));
  // 年度＋月份篩選（依實際完成日）
  const yr=document.getElementById('yearFilter').value;
  const mo=document.getElementById('monthFilter').value;
  if(yr!=='all') list=list.filter(p=>{
    const d=autoDoneDate(p.id)||p.doneDate||p.date||'';
    return d.startsWith(yr);
  });
  if(mo!=='all') list=list.filter(p=>{
    const d=autoDoneDate(p.id)||p.doneDate||'';
    return d.slice(5,7)===mo;
  });
  // 收合已完成
  const doneList=list.filter(p=>getStatus(p)==='已完成');
  const activeList=list.filter(p=>getStatus(p)!=='已完成');
  if(collapseDone && doneList.length){
    list=activeList;
  }
  const ord={需追蹤:-1,執行中:1,待執行:2,已完成:3};
  list.sort((a,b)=>(a.alert==='需追蹤'?-1:ord[a._status]||4)-(b.alert==='需追蹤'?-1:ord[b._status]||4)||(a.date||'').localeCompare(b.date||''));

  const lastLog = p => { const logs=p.logs||[]; return logs.length?logs[logs.length-1].text:'—'; };

  document.getElementById('bossTableBody').innerHTML=list.length?list.map(p=>{
    const col=sc(p._status),ia=p.alert==='需追蹤';
    const d=parseDate(p.date);
    const isPast=d&&p._status!=='已完成'&&d<new Date();
    const ds=p.date?p.date.replace('2026-',''):'—';
    return `<tr class="${ia?'alert-tr':''}" onclick="openDetail('${p.id}')">
      <td><span class="grade grade-${p.grade}">${p.grade}</span></td>
      <td style="font-weight:700;color:${ia?'var(--alert)':'var(--ink)'};white-space:normal;word-break:break-all">${p.name||''}</td>
      <td style="text-align:center"><button onclick="event.stopPropagation();jumpToItems('${p.id}')" style="background:var(--jc-l);color:var(--jc);border:none;border-radius:6px;padding:4px 7px;font-size:12px;cursor:pointer;font-weight:700">📋</button></td>
      <td><span class="biz-badge ${bizC(p.biz)}">${bizL(p.biz)}</span></td>

function renderKanban(){
  const stages=['待執行','設計中','提案中','修改中','已簽核','製作檔','給檔完成','流標'];
  // stageColors defined globally below

  // Use same filter as renderBoss
  let list=[...projects];
  const yr=document.getElementById('yearFilter')?.value||'all';
  const mo=document.getElementById('monthFilter')?.value||'all';
  const q=(document.getElementById('bossSearch')?.value||'').toLowerCase();

  if(yr!=='all') list=list.filter(p=>(p.date||p.doneDate||'').startsWith(yr));
  if(mo!=='all') list=list.filter(p=>{const d=p.date||p.doneDate||'';return d.split('-')[1]===mo;});
  if(q) list=list.filter(p=>(p.name||'').toLowerCase().includes(q));

  if(bossFilter&&bossFilter!=='all'){
    if(bossFilter==='佳') list=list.filter(p=>p.biz==='佳'||p.biz==='佳艾');
    else if(bossFilter==='艾') list=list.filter(p=>p.biz==='艾'||p.biz==='佳艾');
    else if(bossFilter==='JC') list=list.filter(p=>p.biz==='JC');
    else if(bossFilter==='事業') list=list.filter(p=>p.biz==='事業');
    else if(bossFilter==='招商') list=list.filter(p=>p.biz==='招商');
    else if(bossFilter==='急') list=list.filter(p=>p.grade==='急');
    else if(bossFilter==='大') list=list.filter(p=>p.grade==='大');
    else if(bossFilter==='中') list=list.filter(p=>p.grade==='中');
    else if(bossFilter==='小') list=list.filter(p=>p.grade==='小');
    else if(bossFilter==='進行中') list=list.filter(p=>getStatus(p)==='執行中');
    else if(bossFilter==='給檔完成') list=list.filter(p=>getStatus(p)==='已完成');
    else if(bossFilter==='流標') list=list.filter(p=>getStatus(p)==='流標');
    else if(bossFilter==='待執行') list=list.filter(p=>getStatus(p)==='待執行');
    else if(bossFilter==='需追蹤') list=list.filter(p=>autoAlert(p.id)==='需追蹤');
  }

  // Group by proj dominant stage
  const grouped={};
  stages.forEach(s=>grouped[s]=[]);
  list.forEach(p=>{
    const its=projItems(p.id);
    let stage='待執行';
    if(its.length){
      const active=its.filter(i=>i.status!==VOID_STATUS);
      if(!active.length){
        stage='流標';
      } else if(active.every(i=>i.status===DONE_STATUS)){
        // 所有細項都給檔完成 → 給檔完成欄
        stage=DONE_STATUS;
      } else {
        // 用最多細項的階段
        const stageCounts={};
        active.forEach(i=>{
          const s=i.status||'待執行';
          stageCounts[s]=(stageCounts[s]||0)+1;
        });
        stage=Object.entries(stageCounts).sort((a,b)=>b[1]-a[1])[0][0];
      }
    } else {
      stage=p.status||'待執行';
    }
    if(grouped[stage]!==undefined) grouped[stage].push(p);
    else grouped['待執行'].push(p);
  });

  const CARDS_LIMIT = 8;
  const board=document.getElementById('kanbanBoard');
  board.innerHTML=stages.map(s=>{
    const col=stageColors[s]||'#94a3b8';
    let cards=grouped[s]||[];

    // Sort: 待執行 by date asc, others by updatedAt desc (use Firebase id as proxy)
    if(s==='待執行'){
      cards=[...cards].sort((a,b)=>{
        const da=parseDate(a.date)||new Date(9999,0);
        const db=parseDate(b.date)||new Date(9999,0);
        return da-db;
      });
    } else {
      // Sort by most recently modified (use id as proxy - larger id = newer in Firestore)
      cards=[...cards].sort((a,b)=>(b.id||'').localeCompare(a.id||''));
    }

    const isExpanded=window._kanbanExpanded&&window._kanbanExpanded[s];
    const showCards = (cards.length>CARDS_LIMIT&&!isExpanded) ? cards.slice(0,CARDS_LIMIT) : cards;
    const hiddenCount = cards.length - showCards.length;

    const cardHtml = showCards.map(p=>{
      const qty=projItems(p.id).reduce((a,i)=>a+(parseInt(i.qty)||1),0);
      const ia=autoAlert(p.id)==='需追蹤';
      const nameC=ia?'var(--alert)':'var(--ink)';
      return '<div class="kanban-card'+(ia?' alert-card':'')+'" data-pid="'+p.id+'" onclick="openDetail(this.dataset.pid)">'
        +'<div class="kanban-card-name" style="color:'+nameC+'">'+(p.name||'')+'</div>'
        +'<div class="kanban-card-meta">'
        +'<span class="grade grade-'+p.grade+'">'+p.grade+'</span>'
        +'<span class="biz-badge '+bizC(p.biz)+'" style="font-size:10px">'+bizL(p.biz)+'</span>'
        +(qty?'<span style="font-size:10px;color:var(--ink4);margin-left:auto">×'+qty+'</span>':'')
        +'</div></div>';
    }).join('')||'<div style="font-size:12px;color:var(--ink4);text-align:center;padding:16px 0">—</div>';

    const moreBtn = hiddenCount>0
      ? '<div data-stage="'+s+'" onclick="expandKanbanCol(this.dataset.stage)" style="text-align:center;padding:8px;font-size:12px;color:var(--ink3);cursor:pointer;border:1px dashed var(--line);border-radius:8px;margin-top:4px">還有 '+hiddenCount+' 個 ▼</div>'
      : (isExpanded&&cards.length>CARDS_LIMIT ? '<div data-stage="'+s+'" onclick="collapseKanbanCol(this.dataset.stage)" style="text-align:center;padding:8px;font-size:12px;color:var(--ink3);cursor:pointer;border:1px dashed var(--line);border-radius:8px;margin-top:4px">收合 ▲</div>' : '');

    return '<div class="kanban-col">'
      +'<div class="kanban-col-header" style="border-color:'+col+'">'
      +'<span class="kanban-col-title" style="color:'+col+'">'+s+'</span>'
      +'<span class="kanban-col-count" style="color:'+col+'">'+cards.length+'</span>'
      +'</div>'
      +cardHtml+moreBtn
      +'</div>';
  }).join('');
}

function openEditProj(id){
  if(!isEdit){ showToast('請先登入編輯模式'); return; }
  editProjId=id; const p=getProj(id);
  if(!p){ showToast('找不到此專案'); return; }
  tempProjLogs=[...(p.logs||[])];
  document.getElementById('projModalTitle').textContent='✏️ 編輯專案';
  document.getElementById('projDelBtn').style.display='block';
  document.getElementById('projLogSection').style.display='block';
  document.getElementById('pGrade').value=p.grade||'中';
  document.getElementById('pBiz').value=p.biz||'佳';
  document.getElementById('pName').value=p.name||'';
  document.getElementById('pDate').value=p.date||'';
  const autoD=autoDoneDate(id)||p.doneDate||'';
  document.getElementById('pDoneDate').value=autoD;
  // Parse name back to stores + suffix
  document.querySelectorAll('.store-cb').forEach(cb=>cb.checked=false);
  const allStoreVals = [...document.querySelectorAll('.store-cb')].map(c=>c.value);
  const nameParts=(p.name||'').split('_');
  let storeVals=[],suffixVal='';
  for(let i=nameParts.length-1;i>=1;i--){
    const possible=nameParts.slice(0,i).join('_').split('+');
    if(possible.every(s=>allStoreVals.includes(s))){storeVals=possible;suffixVal=nameParts.slice(i).join('_');break;}
  }
  if(!storeVals.length) suffixVal=p.name||'';
  document.querySelectorAll('.store-cb').forEach(cb=>{cb.checked=storeVals.includes(cb.value);});
  document.getElementById('pNameSuffix').value=suffixVal;
  // alert is now auto-calculated
  renderProjLogList();
  document.getElementById('projModal').classList.add('open');
}

// ── 統計 ──
function getDashFilters(){
  const yr     = document.getElementById('dashYearSel').value;
  const period = document.getElementById('dashPeriodSel').value;
  // period: 'all' | 'Q1'~'Q4' | 'M01'~'M12'
  const isQ = period.startsWith('Q');
  const isM = period.startsWith('M');
  const qMap = {Q1:[1,3],Q2:[4,6],Q3:[7,9],Q4:[10,12]};
  const qRange = isQ ? qMap[period] : null;
  const moVal  = isM ? period.slice(1) : null;
  return {yr, period, isQ, isM, qRange, moVal};
}
function filterProjectsByDash(projs){
  const {yr,isQ,isM,qRange,moVal} = getDashFilters();
  return projs.filter(p=>{
    const doneD = autoDoneDate(p.id)||p.doneDate||'';
    const refD  = doneD||p.date||'';
    if(yr!=='all' && !refD.startsWith(yr)) return false;
    if(isQ){
      const dt=parseDate(doneD||p.date);
      if(!dt) return false;
      const m=dt.getMonth()+1;
      if(m<qRange[0]||m>qRange[1]) return false;
    }
    if(isM){
      if(doneD.slice(5,7)!==moVal) return false;
    }
    return true;
  });
}
function filterItemsByDash(its){
  const {yr,isQ,isM,qRange,moVal} = getDashFilters();
  return its.filter(i=>{
    const doneD = i.doneDate||'';
    const refD  = doneD||i.end||'';
    if(yr!=='all' && !refD.startsWith(yr)) return false;
    if(isQ){
      const dt=parseDate(doneD||i.end);
      if(!dt) return false;
      const m=dt.getMonth()+1;
      if(m<qRange[0]||m>qRange[1]) return false;
    }
    if(isM){
      if(doneD.slice(5,7)!==moVal) return false;
    }
    return true;
  });
}

  const alert=filtProjs.filter(p=>p.alert==='需追蹤').length;

  // 件數統計
  const totalQty=filtItems.reduce((a,i)=>a+(parseInt(i.qty)||1),0);
  const doneQty=filtItems.filter(i=>i.status===DONE_STATUS).reduce((a,i)=>a+(parseInt(i.qty)||1),0);
  const undoneQty=totalQty-doneQty;
  const qtyPct=totalQty>0?Math.round(doneQty/totalQty*100):0;

window.exportPDF = () => {

  const total=filtProjs.length;
  const done=statuses.filter(s=>s==='已完成').length;
  const prog=statuses.filter(s=>s==='執行中').length;
  const wait=statuses.filter(s=>s==='待執行').length;
  const alert=filtProjs.filter(p=>p.alert==='需追蹤').length;
  const {yr:_yr2,period:_pd2}=getDashFilters();
  const pdName2={Q1:'Q1',Q2:'Q2',Q3:'Q3',Q4:'Q4',M01:'1月',M02:'2月',M03:'3月',M04:'4月',M05:'5月',M06:'6月',M07:'7月',M08:'8月',M09:'9月',M10:'10月',M11:'11月',M12:'12月'};
  const filterLabel=[_yr2!=='all'?_yr2:'',_pd2!=='all'?pdName2[_pd2]:''].filter(Boolean).join('・')||'全部';

  const quarters={Q1:0,Q2:0,Q3:0,Q4:0};
  filtProjs.forEach(p=>{
    const d=parseDate(autoDoneDate(p.id)||p.doneDate||p.date); if(!d) return;
    if(getStatus(p)!=='已完成') return;
    const m=d.getMonth()+1;
    if(m<=3) quarters.Q1++; else if(m<=6) quarters.Q2++; else if(m<=9) quarters.Q3++; else quarters.Q4++;
  });
  const maxQ=Math.max(...Object.values(quarters),1);

  const bizCount={佳瑪:0,艾瑪特:0,JCPARK:0,事業部:0,招商事業部:0};

    if(p.biz==='JC') bizCount['JCPARK']++;
    if(p.biz==='事業') bizCount['事業部']++;

  const qtyPct=totalQty>0?Math.round(doneQty/totalQty*100):0;

  const bizQtyTotal={佳瑪:0,艾瑪特:0,JCPARK:0,事業部:0,招商事業部:0};

    const hFont = {bold:true,color:{argb:'FFFFFFFF'},size:11};
    const hAlign = {horizontal:'center',vertical:'middle',wrapText:true};
    const border = {top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
    const altFill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F4FA'}};
    const centerAlign = {horizontal:'center',vertical:'middle'};
    const midAlign = {vertical:'middle',wrapText:true};

    function styleHeader(row){
      row.height = 22;
      row.eachCell(cell=>{
        cell.fill=hFill; cell.font=hFont;
        cell.alignment=hAlign; cell.border=border;
      });
    }
    function styleData(row, alt){
      row.height = 18;
      row.eachCell(cell=>{
        if(alt) cell.fill=altFill;
        cell.alignment=midAlign; cell.border=border;
      });
    }

    // ── 工作表1：大項目 ──
    const ws1 = wb.addWorksheet('大項目');
    ws1.columns = [
      {header:'等級',key:'grade',width:6},
      {header:'專案名稱',key:'name',width:28},
      {header:'事業部',key:'biz',width:10},
      {header:'狀態',key:'status',width:8},
      {header:'完成率',key:'pct',width:8},
      {header:'總件數',key:'qty',width:8},
      {header:'預計完工',key:'date',width:12},
      {header:'實際完成',key:'doneDate',width:12},
      {header:'關注',key:'alert',width:10},
      {header:'最新備註',key:'note',width:35},
    ];
    styleHeader(ws1.getRow(1));
    ws1.views = [{state:'frozen',ySplit:1}];

    const sortedProjs=[...projects].sort((a,b)=>{const o={急:0,大:1,中:2,小:3};return (o[a.grade]||4)-(o[b.grade]||4);});
    sortedProjs.forEach((p,idx)=>{
      const st=getStatus(p),pc=pctNum(p.id);
      const qty=items.filter(i=>i.projId===p.id).reduce((a,i)=>a+(parseInt(i.qty)||1),0);
      const al=autoAlert(p.id);
      const lastLog=(p.logs&&p.logs.length)?p.logs[p.logs.length-1].text:'';
      const row=ws1.addRow([p.grade,p.name,bizL(p.biz),st,pc+'%',qty||0,p.date||'',autoDoneDate(p.id)||p.doneDate||'',al==='-'?'—':al,lastLog]);
      styleData(row,idx%2===1);
      // 狀態顏色
      const stCell=row.getCell('status');
      if(st==='已完成') stCell.font={color:{argb:'FF16A34A'},bold:true};
      else if(st==='執行中') stCell.font={color:{argb:'FFD97706'},bold:true};
      // 等級顏色
      const grCell=row.getCell('grade');
      if(p.grade==='急') grCell.font={color:{argb:'FFDC2626'},bold:true};
      else if(p.grade==='大') grCell.font={color:{argb:'FF92400E'},bold:true};
      grCell.alignment=centerAlign;
    });

    // ── 工作表2：細項 ──
    const ws2 = wb.addWorksheet('細項');
    ws2.columns = [
      {header:'專案名稱',key:'proj',width:22},
      {header:'事業部',key:'biz',width:8},
      {header:'具體內容',key:'content',width:28},
      {header:'分類',key:'cat',width:10},
      {header:'狀態',key:'status',width:8},
      {header:'件數',key:'qty',width:6},
      {header:'起始日',key:'start',width:12},
      {header:'預計完成',key:'end',width:12},
      {header:'實際完成',key:'done',width:12},
      {header:'最新備註',key:'note',width:35},
    ];
    styleHeader(ws2.getRow(1));
    ws2.views = [{state:'frozen',ySplit:1}];

    items.forEach((i,idx)=>{
      const p=getProj(i.projId)||{};
      const biz=i.biz||p.biz||'';
      const lastLog=(i.logs&&i.logs.length)?i.logs[i.logs.length-1].text:'';
      const row=ws2.addRow([p.name||'',bizL(biz),i.content||'',i.category||'',i.status||'',parseInt(i.qty)||1,i.start||'',i.end||'',i.doneDate||'',lastLog]);
      styleData(row,idx%2===1);
      const stCell=row.getCell('status');
      if(i.status==='已完成') stCell.font={color:{argb:'FF16A34A'},bold:true};
      else if(i.status==='執行中') stCell.font={color:{argb:'FFD97706'},bold:true};
    });

    // ── 工作表3：統計 ──
    const ws3 = wb.addWorksheet('統計');
    ws3.getColumn(1).width=22; ws3.getColumn(2).width=12;
    ws3.getColumn(3).width=10; ws3.getColumn(4).width=10; ws3.getColumn(5).width=10;

    function addSection(title, headers, dataRows){
      // 分區標題
      ws3.addRow([title]);
      const titleRow=ws3.lastRow;
      titleRow.height=20;
      titleRow.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF2563EB'}};
      titleRow.getCell(1).font={bold:true,color:{argb:'FFFFFFFF'},size:11};
      titleRow.getCell(1).border=border;
      // 小標題
      ws3.addRow(headers);
      styleHeader(ws3.lastRow);
      // 資料
      dataRows.forEach((r,idx)=>{
        ws3.addRow(r);
        styleData(ws3.lastRow, idx%2===1);
      });
      ws3.addRow([]);
    }

    const total=projects.length;
    const done=projects.filter(p=>getStatus(p)==='已完成').length;
    const prog=projects.filter(p=>getStatus(p)==='執行中').length;
    const wait=projects.filter(p=>getStatus(p)==='待執行').length;
    const alertC=projects.filter(p=>autoAlert(p.id)==='需追蹤').length;
    const totalQty=items.reduce((a,i)=>a+(parseInt(i.qty)||1),0);
    const doneQty=items.filter(i=>i.status==='已完成').reduce((a,i)=>a+(parseInt(i.qty)||1),0);

    function addSectionF(title, headers, dataRows){
      ws3.addRow([title]);
      const titleRow=ws3.lastRow;
      titleRow.height=20;
      for(let ci=1;ci<=5;ci++){
        const cell=titleRow.getCell(ci);
        cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF2563EB'}};
        cell.font={bold:true,color:{argb:'FFFFFFFF'},size:11};
        cell.border=border;
      }
      ws3.addRow(headers);
      styleHeader(ws3.lastRow);
      dataRows.forEach((r,idx)=>{
        const row=ws3.addRow(r);
        styleData(row,idx%2===1);
      });
      ws3.addRow([]);
    }

    const totalQtyX=items.reduce((a,i)=>a+(parseInt(i.qty)||1),0);
    const doneQtyX=items.filter(i=>i.status==='已完成').reduce((a,i)=>a+(parseInt(i.qty)||1),0);
    const qtyPctX=totalQtyX>0?Math.round(doneQtyX/totalQtyX*100)+'%':'0%';

    addSectionF('📋 專案總覽',['項目','數量'],[
      ['總專案數', projects.length],
      ['已完成', projects.filter(p=>getStatus(p)==='已完成').length],
      ['執行中', projects.filter(p=>getStatus(p)==='執行中').length],
      ['待執行', projects.filter(p=>getStatus(p)==='待執行').length],
      ['需追蹤', projects.filter(p=>autoAlert(p.id)==='需追蹤').length],
    ]);

    addSectionF('✏️ 設計件數',['項目','數量'],[
      ['總件數', totalQtyX],
      ['已完成件數', doneQtyX],
      ['未完成件數', totalQtyX-doneQtyX],
      ['整體完成率', qtyPctX],
    ]);

    const quarters={Q1:0,Q2:0,Q3:0,Q4:0};
    projects.forEach(p=>{
      const d=parseDate(autoDoneDate(p.id)||p.doneDate||p.date);
      if(!d||getStatus(p)!=='已完成') return;
      const m=d.getMonth()+1;
      if(m<=3)quarters.Q1++;else if(m<=6)quarters.Q2++;else if(m<=9)quarters.Q3++;else quarters.Q4++;
    });
    addSectionF('📅 各季完成專案（依實際完成日）',['季度','完成專案數'],
      Object.entries(quarters).map(([q,n])=>[q,n])
    );

    const bizData={佳瑪:{proj:0,total:0,done:0},艾瑪特:{proj:0,total:0,done:0},JCPARK:{proj:0,total:0,done:0},事業部:{proj:0,total:0,done:0}};
    projects.forEach(p=>{
      if(p.biz==='佳'||p.biz==='佳艾')bizData['佳瑪'].proj++;
      if(p.biz==='艾'||p.biz==='佳艾')bizData['艾瑪特'].proj++;
      if(p.biz==='JC')bizData['JCPARK'].proj++;
      if(p.biz==='事業')bizData['事業部'].proj++;
    });
    items.forEach(i=>{
      const p=getProj(i.projId)||{};
      const biz=i.biz||p.biz||'';
      const qty=parseInt(i.qty)||1,isDone=i.status==='已完成';
      if(biz==='佳'||biz==='佳艾'){bizData['佳瑪'].total+=qty;if(isDone)bizData['佳瑪'].done+=qty;}
      if(biz==='艾'||biz==='佳艾'){bizData['艾瑪特'].total+=qty;if(isDone)bizData['艾瑪特'].done+=qty;}
      if(biz==='JC'){bizData['JCPARK'].total+=qty;if(isDone)bizData['JCPARK'].done+=qty;}
      if(biz==='事業'){bizData['事業部'].total+=qty;if(isDone)bizData['事業部'].done+=qty;}
    });
    addSectionF('🏢 各事業部分布',['事業部','專案數','總件數','完成件數','完成率(%)'],
      Object.entries(bizData).map(([b,d])=>[b,d.proj,d.total,d.done,d.total>0?Math.round(d.done/d.total*100)+'%':'0%'])
    );

    // 下載
    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');
    a.href=url; a.download=`設計專案執行總覽_${date}.xlsx`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('✅ Excel 已下載！');
  } catch(e) {
    console.error(e);
    showToast('❌ 下載失敗：'+e.message);
  }
};

// auto combine proj name
window.onProjSearch = () => {
  const val = document.getElementById('iProjSearch').value;
  const dl = document.getElementById('iProjList');
  const match = [...dl.options].find(o=>o.value===val);
  if(match) document.getElementById('iProjId').value=match.dataset.id||'';
  else document.getElementById('iProjId').value='';
};

window.updateProjName = () => {
  const cbs = [...document.querySelectorAll('.store-cb:checked')].map(c=>c.value);
  const suffix = document.getElementById('pNameSuffix').value.trim();
  const nameEl = document.getElementById('pName');
  const storeStr = cbs.join('+');
  if(storeStr && suffix) nameEl.value = storeStr + '_' + suffix;
  else if(storeStr) nameEl.value = storeStr + '_';
  else nameEl.value = suffix;
};

// ── REPORT ──
let reportRange = 'month';
window.setReportRange = function(btn){
  document.querySelectorAll('.report-range-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  reportRange = btn.dataset.range;
  renderReport();
};

window.renderReport = function(){
  const el = document.getElementById('reportContent');
  if(!el){ console.error('reportContent not found'); return; }
  console.log('renderReport called');
  try {
    const now = new Date();
    const yr = now.getFullYear();
    const mo = String(now.getMonth()+1).padStart(2,'0');
    const todayStr = now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
    const rangeLabel = {week:'本週',month:'本月',lastmonth:'上月',quarter:'本季',year:'本年',all:'全部'}[reportRange]||'本月';

    // 篩選範圍
    function inRange(p){
      // 用預計完成日或實際完成日，只要其中一個符合就算
      const dates = [p.date, autoDoneDate(p.id)||p.doneDate].filter(Boolean);
      if(!dates.length) return reportRange==='all';

      function dateMatches(d){
        const pDate = new Date(d);
        if(reportRange==='week'){
          const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay()+1); weekStart.setHours(0,0,0,0);
          const weekEnd=new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6); weekEnd.setHours(23,59,59,999);
          return pDate>=weekStart && pDate<=weekEnd;
        }
        if(reportRange==='month') return d.startsWith(yr+'-'+mo);
        if(reportRange==='lastmonth'){
          const lm = now.getMonth()===0 ? (yr-1)+'-12' : yr+'-'+String(now.getMonth()).padStart(2,'0');
          return d.startsWith(lm);
        }
        if(reportRange==='quarter'){
          const q=Math.floor(now.getMonth()/3);
          const qMos=[q*3+1,q*3+2,q*3+3].map(m=>yr+'-'+String(m).padStart(2,'0'));
          return qMos.some(m=>d.startsWith(m));
        }
        if(reportRange==='year') return d.startsWith(String(yr));
        return true;
      }
      return dates.some(dateMatches);
    }

    const filtP = reportRange==='all' ? projects : projects.filter(inRange);
    const filtI = reportRange==='all' ? items : items.filter(i=>{ const p=getProj(i.projId)||{}; return inRange(p); });

    const total=filtP.length;
    const done=filtP.filter(p=>getStatus(p)==='已完成').length;
    const prog=filtP.filter(p=>getStatus(p)==='執行中').length;
    const totalQty=filtI.reduce((a,i)=>a+(parseInt(i.qty)||1),0);
    const doneQty=filtI.filter(i=>i.status===DONE_STATUS).reduce((a,i)=>a+(parseInt(i.qty)||1),0);
    const qtyPct=totalQty>0?Math.round(doneQty/totalQty*100):0;

    const urgentProjs=filtP.filter(p=>p.grade==='急'&&getStatus(p)!=='已完成'&&getStatus(p)!=='流標');
    const needAlert=filtP.filter(p=>autoAlert(p.id)==='需追蹤').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const thisMonth=filtP.filter(p=>{ const st=getStatus(p); return st!=='已完成'&&st!=='流標'; }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const doneList=filtP.filter(p=>getStatus(p)==='已完成');

    let html = '';

    // 標題
    html += '<div style="background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:20px 16px 16px;margin-bottom:0">';
    html += '<div style="font-size:11px;opacity:.7;margin-bottom:4px">設計專案課</div>';
    html += '<div style="font-size:20px;font-weight:900;margin-bottom:4px">專案進度報告</div>';
    html += '<div style="font-size:12px;opacity:.8">報告日期：'+todayStr+'　範圍：'+rangeLabel+'</div>';
    html += '</div>';

    // 快速數字列
    html += '<div style="display:flex;gap:0;background:#f8fafc;border-bottom:1px solid var(--line);padding:12px 16px;gap:20px">';
    html += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--ink)">'+total+'</div><div style="font-size:10px;color:var(--ink4)">總專案</div></div>';
    html += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--done)">'+done+'</div><div style="font-size:10px;color:var(--ink4)">已完成</div></div>';
    html += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--prog)">'+prog+'</div><div style="font-size:10px;color:var(--ink4)">進行中</div></div>';
    html += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--alert)">'+urgentProjs.length+'</div><div style="font-size:10px;color:var(--ink4)">急件</div></div>';
    html += '<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--alert)">'+needAlert.length+'</div><div style="font-size:10px;color:var(--ink4)">需追蹤</div></div>';
    html += '</div>';

    html += '<div style="padding:16px">';

    // 📝 文字摘要（放最上面）
    html += '<div style="background:white;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)">';
    html += '<div style="font-size:13px;font-weight:800;color:var(--ink2);margin-bottom:10px">📝 整體摘要</div>';
    let summary = rangeLabel+'共執行 <strong>'+total+'</strong> 個專案，';
    summary += '已完成 <strong style="color:var(--done)">'+done+'</strong> 個';
    if(total>0) summary += '（完成率 <strong>'+(Math.round(done/total*100))+'%</strong>）';
    summary += '，目前進行中 <strong>'+prog+'</strong> 個。';
    if(totalQty>0) summary += '<br>設計件數共 <strong>'+totalQty+'</strong> 件，已給檔 <strong style="color:var(--done)">'+doneQty+'</strong> 件（<strong>'+qtyPct+'%</strong>）。';
    if(urgentProjs.length) summary += '<br>⚠️ 目前有 <strong style="color:#dc2626">'+urgentProjs.length+'</strong> 個急件需優先處理。';
    if(needAlert.length) summary += '<br>⚠️ 共 <strong style="color:var(--alert)">'+needAlert.length+'</strong> 個專案需追蹤關注。';
    if(done>0&&urgentProjs.length===0&&needAlert.length===0) summary += '<br>✅ 目前無急件及需追蹤項目，進度良好。';
    html += '<p style="margin:0;line-height:1.8;font-size:13px;color:var(--ink)">'+summary+'</p>';
    html += '</div>';

    // 🚨 急件
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:13px;font-weight:800;color:#dc2626;margin-bottom:8px">🚨 急件（'+urgentProjs.length+'個）</div>';
    if(urgentProjs.length){
      urgentProjs.forEach(function(p){
        const st=getStatus(p);
        const lastLog=(p.logs&&p.logs.length)?p.logs[p.logs.length-1].text:'';
        html += '<div style="background:white;border-left:3px solid #dc2626;border-radius:0 10px 10px 0;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)">';
        html += '<div style="font-weight:700;color:#dc2626;margin-bottom:4px">'+p.name+'</div>';
        html += '<div style="font-size:12px;color:var(--ink3);display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
        html += '<span class="biz-badge '+bizC(p.biz)+'" style="font-size:10px">'+bizL(p.biz)+'</span>';
        html += '<span class="status-badge s-'+st+'" style="font-size:10px">'+st+'</span>';
        html += '<span>預計完工：'+(p.date||'未填')+'</span>';
        html += '</div>';
        if(lastLog) html += '<div style="font-size:12px;color:var(--ink2);margin-top:6px;background:#fff5f5;padding:6px 8px;border-radius:6px">📌 '+lastLog+'</div>';
        html += '</div>';
      });
    } else {
      html += '<div style="color:var(--ink4);font-size:13px;padding:8px 0">目前無急件 ✅</div>';
    }
    html += '</div>';

    // ⚠️ 需關注
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:13px;font-weight:800;color:var(--alert);margin-bottom:8px">⚠️ 需關注（'+needAlert.length+'個）</div>';
    if(needAlert.length){
      needAlert.forEach(function(p){
        const st=getStatus(p);
        const d=parseDate(p.date);
        const overdue=d&&d<now;
        const daysLeft=d?Math.ceil((d-now)/(1000*60*60*24)):null;
        const lastLog=(p.logs&&p.logs.length)?p.logs[p.logs.length-1].text:'';
        html += '<div style="background:white;border-left:3px solid var(--alert);border-radius:0 10px 10px 0;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
        html += '<div style="font-weight:700;color:var(--alert)">'+p.name+'</div>';
        if(overdue) html += '<span style="font-size:11px;color:#dc2626;font-weight:700;white-space:nowrap;margin-left:8px">逾期'+(daysLeft?Math.abs(daysLeft)+'天':'')+'</span>';
        else if(daysLeft!==null) html += '<span style="font-size:11px;color:var(--alert);white-space:nowrap;margin-left:8px">還剩'+daysLeft+'天</span>';
        html += '</div>';
        html += '<div style="font-size:12px;color:var(--ink3);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px">';
        html += '<span class="biz-badge '+bizC(p.biz)+'" style="font-size:10px">'+bizL(p.biz)+'</span>';
        html += '<span class="status-badge s-'+st+'" style="font-size:10px">'+st+'</span>';
        html += '<span>預計完工：'+(p.date||'未填')+'</span>';
        html += '</div>';
        if(lastLog) html += '<div style="font-size:12px;color:var(--ink2);margin-top:6px;background:#fff8f0;padding:6px 8px;border-radius:6px">📌 '+lastLog+'</div>';
        else html += '<div style="font-size:12px;color:var(--ink4);margin-top:6px">尚無備註</div>';
        html += '</div>';
      });
    } else {
      html += '<div style="color:var(--ink4);font-size:13px;padding:8px 0">目前無需關注項目 ✅</div>';
    }
    html += '</div>';

    // 📋 進行中專案
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:13px;font-weight:800;color:var(--ink2);margin-bottom:8px">📋 進行中（'+thisMonth.length+'個）</div>';
    if(thisMonth.length){
      thisMonth.forEach(function(p){
        const st=getStatus(p);
        const pc=pctNum(p.id);
        const col=sc(st);
        html += '<div style="background:white;border-radius:10px;padding:12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
        html += '<div style="font-weight:700;font-size:13px">'+p.name+'</div>';
        html += '<span style="font-size:11px;color:var(--ink4);white-space:nowrap;margin-left:8px">'+(p.date||'—')+'</span>';
        html += '</div>';
        html += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px">';
        html += '<span class="biz-badge '+bizC(p.biz)+'" style="font-size:10px">'+bizL(p.biz)+'</span>';
        html += '<span class="status-badge s-'+st+'" style="font-size:10px">'+st+'</span>';
        html += '</div>';
        html += '<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:'+pc+'%;background:'+col+'"></div></div><span class="prog-pct" style="color:'+col+'">'+pc+'%</span></div>';
        html += '</div>';
      });
    } else {
      html += '<div style="color:var(--ink4);font-size:13px;padding:8px 0">無進行中專案</div>';
    }
    html += '</div>';

    // ✅ 已完成
    if(doneList.length){
      html += '<div style="margin-bottom:16px">';
      html += '<div style="font-size:13px;font-weight:800;color:var(--done);margin-bottom:8px">✅ 已完成（'+doneList.length+'個）</div>';
      doneList.forEach(function(p){
        const doneD=autoDoneDate(p.id)||p.doneDate||'';
        html += '<div style="background:white;border-left:3px solid var(--done);border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)">';
        html += '<div style="font-weight:700;color:var(--done)">'+p.name+'</div>';
        html += '<div style="font-size:12px;color:var(--ink3);margin-top:4px;display:flex;gap:8px">';
        html += '<span class="biz-badge '+bizC(p.biz)+'" style="font-size:10px">'+bizL(p.biz)+'</span>';
        if(doneD) html += '<span>完成日：'+doneD+'</span>';
        html += '</div></div>';
      });
      html += '</div>';
    }

    html += '</div>';
    el.innerHTML = html;
  } catch(e){ console.error('renderReport error:', e); el.innerHTML = '<div style="padding:20px;color:red">錯誤：'+e.message+'</div>'; }
}
window.showScreen = (name, btn) => {
  curScreen=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const ab=document.getElementById('addBtnTop');
  if(name==='boss'){
    ab.style.display=isEdit?'':'none'; ab.textContent='＋ 新增專案'; ab.onclick=openAddProj;
    document.getElementById('mobileAddProj').style.display=isEdit?'block':'none';
    document.getElementById('mobileAddItem').style.display='none';
  } else if(name==='items'){
    ab.style.display=isEdit?'':'none'; ab.textContent='＋ 新增細項'; ab.onclick=()=>openAddItem();
    document.getElementById('addItemBtn').style.display=isEdit?'':'none';
    document.getElementById('mobileAddItem').style.display=isEdit?'block':'none';
    document.getElementById('mobileAddProj').style.display='none';
    populateFilters(); renderItems();
  } else if(name==='report'){
    ab.style.display='none';
    document.getElementById('mobileAddProj').style.display='none';
    document.getElementById('mobileAddItem').style.display='none';
    renderReport();
  } else {
    ab.style.display='none';
    document.getElementById('mobileAddProj').style.display='none';
    document.getElementById('mobileAddItem').style.display='none';
    renderDash();
  }
};
window.handleAddBtn = () => curScreen==='boss'?openAddProj():openAddItem();

// ── LIGHTBOX ──
window.openLightbox = url => { document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('open'); };
window.closeLightbox = () => document.getElementById('lightbox').classList.remove('open');

// ── UTILS ──
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.closeOuter = (e,id) => { if(e.target===document.getElementById(id)) closeModal(id); };
window.showToast = msg => {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
};
function showToast(msg){ window.showToast(msg); }
</script>
</body>
</html>
